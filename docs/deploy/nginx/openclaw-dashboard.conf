# OpenClaw Manager dashboard — reverse proxy (HTTP).
# Install: sudo cp docs/deploy/nginx/openclaw-dashboard.conf /etc/nginx/conf.d/openclaw-dashboard.conf
# Adjust server_name if you use a hostname; underscore accepts any Host on this port.

server {
  listen       80;
  listen       [::]:80;
  server_name  _;

  location / {
    proxy_pass http://127.0.0.1:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    proxy_read_timeout 300s;

    proxy_buffering off;
    proxy_request_buffering off;
  }
}
