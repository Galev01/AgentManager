# systemd drop-in: bind Next.js standalone to loopback only (use with nginx reverse proxy).
# Install on the dashboard host:
#   sudo mkdir -p /etc/systemd/system/openclaw-dashboard.service.d
#   sudo cp docs/deploy/systemd/openclaw-dashboard.bind-loopback.conf \
#       /etc/systemd/system/openclaw-dashboard.service.d/bind-loopback.conf
#   sudo systemctl daemon-reload
#   sudo systemctl restart openclaw-dashboard
#
# Next standalone uses HOSTNAME + PORT when starting server.js.

[Service]
Environment=HOSTNAME=127.0.0.1
Environment=PORT=3000
